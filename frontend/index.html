<!doctype html>
<html>
  <head>
    <title>GitHub Dashboard</title>
    <link rel="shortcut icon" href="../images/favicon.avif" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="MenuContainer">
      <h1>Mis Repositorios</h1>
      <div class="login">
        <select id="cuenta">
          <option value="CLIENT_ID1">CLIENT_ID</option>
          <option value="CLIENT_ID2">CLIENT_ID2</option>
        </select>
        <button onclick="login()">Login con GitHub</button>
      </div>
      <input type="text" id="token" placeholder="GitHub Token" />
      <button onclick="cargarRepos()">Cargar</button>
    </div>

    <div class="TreeContainer">
      <div class="repos">
        <span>Repositorios:</span>
        <!-- <label for="repos">Repositorios:</label> -->
        <ul id="repos" class="contenedor-scroll"></ul>
      </div>
      <div class="tree">
        <span>Archivos:</span>
        <div id="tree" class="contenedor-scroll"></div>
        <div class="linkContainer">
          <a id="pagesLink" target="_blank">👉 Abrir página</a>
        </div>
      </div>
      <!-- <iframe
        id="repoPage"
        style="width: 60%; height: 600px; border: 1px solid #ccc"
      > -->
      <!-- <a id="pagesLink" target="_blank">Abrir página</a> -->
      <!-- </iframe> -->
      <!-- <iframe src="https://usuario.github.io/repo/" width="100%" height="600px">
      </iframe> -->
    </div>

    <div class="EditContainer">
      <h2>Editor</h2>
      <div class="NameContainer">
        <label class="Nombre" for="NombreArchivo">Nombre Archivo:</label>
        <span id="NombreArchivo"></span>
      </div>
      <textarea id="editor"></textarea>
      <button onclick="guardar()">Guardar</button>
    </div>
    <!-- <button onclick="guardar()">Guardar</button> -->

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/validator/validator.min.js"></script>
  </body>
</html>
