<!doctype html>
<html>
  <head>
    <title>GitHub Dashboard</title>
    <link rel="shortcut icon" href="../images/favicon.avif" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="MenuContainer">
      <h1>Mis Repositorios</h1>

      <input type="text" id="token" placeholder="GitHub Token" />
      <button onclick="cargarRepos()">Cargar</button>
    </div>

    <div class="TreeContainer">
      <ul id="repos"></ul>
      <div id="tree"></div>
    </div>

    <div class="EditContainer">
      <h2>Editor</h2>
      <div class="NameContainer">
        <label class="Nombre" for="NombreArchivo">Nombre Archivo:</label>
        <span id="NombreArchivo"></span>
      </div>
      <textarea id="editor"></textarea>
      <button onclick="guardar()">Guardar</button>
    </div>
    <!-- <button onclick="guardar()">Guardar</button> -->

    <script src="app.js"></script>
  </body>
</html>
